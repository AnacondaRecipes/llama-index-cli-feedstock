{% set name = "llama-index-cli" %}
{% set version = "0.5.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/llama_index_cli-{{ version }}.tar.gz
  sha256: ebaf39e785efbfa8d50d837f60cb0f95125c04bf73ed1f92092a2a5f506172f8

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - llamaindex-cli = llama_index.cli.command_line:main

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - llama-index-core >=0.13.0,<0.15
    - llama-index-embeddings-openai >=0.5.0,<0.6
    - llama-index-llms-openai >=0.6.0,<0.7

test:
  imports:
    - llama_index.cli
  commands:
    - pip check
    - llamaindex-cli --help
  requires:
    - pip

about:
  home: https://llamaindex.ai
  summary: llama-index cli
  description: |
    LlamaIndex CLI provides a command-line interface for interacting with LlamaIndex,
    enabling users to quickly set up and use RAG (Retrieval-Augmented Generation) pipelines.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://docs.llamaindex.ai/en/stable/getting_started/starter_tools/rag_cli/
  dev_url: https://github.com/run-llama/llama_index/tree/main/llama-index-cli

extra:
  recipe-maintainers:
    - pavelzw
    - jan-janssen
